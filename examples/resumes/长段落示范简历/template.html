<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --slate-900: #1e293b;
    --slate-700: #334155;
    --slate-500: #64748b;
    --slate-200: #e2e8f0;
    --accent: #2563eb;
    --accent-soft: #dbeafe;
    --ink: #1f2937;
    --paper: #fcfcfd;
  }
  body {
    width: 794px;
    margin: 0 auto;
    padding: 48px 56px;
    background: var(--paper);
    color: var(--ink);
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', 'Inter', Arial, sans-serif;
    font-size: 10.5pt;
    line-height: 1.62;
  }
  .resume-header {
    margin-bottom: 24px;
    padding-bottom: 14px;
    border-bottom: 2px solid var(--slate-200);
  }
  .header-note {
    display: inline-block;
    margin-bottom: 8px;
    padding: 2px 10px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 7.5pt;
    font-weight: 600;
    letter-spacing: 1px;
  }
  [data-section-type="name"] {
    font-size: 34pt;
    line-height: 1.08;
    font-weight: 800;
    color: var(--slate-900);
    letter-spacing: 7px;
    margin-bottom: 6px;
  }
  [data-section-type="contact"] {
    color: var(--slate-500);
    font-size: 9.5pt;
    letter-spacing: 0.2px;
  }
  .resume-header-divider {
    width: 100%;
    height: 2px;
    margin-top: 12px;
    background: linear-gradient(90deg, var(--accent), rgba(37, 99, 235, 0.15));
    border-radius: 999px;
  }
  [data-sections-slot="main"] {
    margin-top: 0;
  }
  .resume-section {
    margin-bottom: 17px;
  }
  .resume-section-title {
    width: 100%;
    margin-bottom: 8px;
    padding-bottom: 4px;
    color: var(--slate-700);
    font-size: 14pt;
    font-weight: 700;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--slate-200);
  }
  .resume-section-content p {
    margin-bottom: 6px;
  }
  .resume-section-content > p,
  .resume-section-content > ul > li,
  .resume-section-content > ol > li {
    text-align: justify;
    text-justify: inter-ideograph;
  }
  .resume-section-content ul {
    padding-left: 18px;
    margin-bottom: 6px;
  }
  .resume-section-content li {
    margin-bottom: 3px;
  }
  .resume-section-content li::marker {
    color: var(--accent);
  }
  .resume-section-content strong {
    color: var(--slate-700);
    font-weight: 700;
  }
  .resume-section-content h1 {
    font-size: 28pt;
    line-height: 1.14;
    font-weight: 800;
    letter-spacing: 2px;
    margin: 8px 0 4px;
    color: var(--slate-900);
  }
  .resume-section-content h2 {
    font-size: 14pt;
    line-height: 1.25;
    font-weight: 700;
    margin: 8px 0 4px;
    color: var(--slate-700);
  }
  .resume-section-content h3 {
    font-size: 12.5pt;
    line-height: 1.30;
    font-weight: 700;
    margin: 8px 0 4px;
    color: var(--slate-700);
  }
  .resume-section-content h4 {
    font-size: 11.25pt;
    line-height: 1.32;
    font-weight: 700;
    margin: 7px 0 3px;
    color: var(--slate-700);
  }
  .resume-section-content h5 {
    font-size: 10.5pt;
    line-height: 1.32;
    font-weight: 700;
    margin: 6px 0 2px;
    color: var(--slate-700);
  }
  .resume-section-content h6 {
    font-size: 10pt;
    line-height: 1.30;
    font-weight: 700;
    margin: 5px 0 2px;
    color: var(--slate-500);
  }
  .inner-row {
    display: grid;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
  }
  .inner-col {
    min-width: 0;
    overflow-wrap: anywhere;
    box-sizing: border-box;
  }
  .inner-col--left { text-align: left; }
  .inner-col--center { text-align: center; }
  .inner-col--right { text-align: right; }
  .inner-col h1, .inner-col h2, .inner-col h3,
  .inner-col h4, .inner-col h5, .inner-col h6,
  .inner-col p { margin: 0; }
</style>
</head>
<body>
  <div class="resume">
    <header class="resume-header">
      <div class="header-note">Typography Demo</div>
      <h1 data-section-type="name"></h1>
      <div data-section-type="contact"></div>
      <div class="resume-header-divider" aria-hidden="true"></div>
    </header>

    <main data-sections-slot="main"></main>
  </div>
</body>
</html>
