<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-size: 10.5pt;
    line-height: 1.6;
    color: #2c2c2c;
    padding: 48px 56px;
    max-width: 800px;
    margin: auto;
  }
  .resume-header {
    text-align: center;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 2.5px solid #1a5276;
  }
  .resume-header h1,
  [data-section-type="name"] {
    font-size: 34pt;
    font-weight: 700;
    color: #1a5276;
    letter-spacing: 7px;
    margin-bottom: 4px;
  }
  .resume-header .contact,
  [data-section-type="contact"] {
    font-size: 9.5pt;
    color: #666;
  }
  [data-sections-slot="main"] {
    margin-top: 0;
  }
  .resume-section {
    margin-bottom: 18px;
  }
  .resume-section-title {
    font-size: 14pt;
    font-weight: 600;
    color: #1a5276;
    border-bottom: 1.2px solid #b0cfe0;
    padding-bottom: 3px;
    margin-bottom: 8px;
  }
  .resume-section-content p { margin-bottom: 6px; }
  .resume-section-content ul { padding-left: 18px; margin-bottom: 6px; }
  .resume-section-content li { margin-bottom: 2px; }
  .resume-section-content strong { color: #1a5276; }
  .resume-section-content h1 {
    font-size: 28pt;
    font-weight: 700;
    letter-spacing: 2px;
    margin: 8px 0 4px;
    color: #1a5276;
  }
  .resume-section-content h2 {
    font-size: 14pt;
    font-weight: 600;
    margin: 8px 0 4px;
    color: #333;
  }
  .resume-section-content h3 {
    font-size: 12.5pt;
    font-weight: 600;
    margin: 8px 0 4px;
    color: #333;
  }
  .resume-section-content h4 {
    font-size: 11.25pt;
    font-weight: 600;
    margin: 7px 0 3px;
    color: #333;
  }
  .resume-section-content h5 {
    font-size: 10.5pt;
    font-weight: 600;
    margin: 6px 0 2px;
    color: #333;
  }
  .resume-section-content h6 {
    font-size: 10pt;
    font-weight: 600;
    margin: 5px 0 2px;
    color: #444;
  }
</style>
</head>
<body>
  <div class="resume">
    <div class="resume-header">
      <h1 data-section-type="name"></h1>
      <div class="contact" data-section-type="contact"></div>
    </div>

    <main data-sections-slot="main"></main>
  </div>
</body>
</html>
