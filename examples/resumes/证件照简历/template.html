<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', Arial, sans-serif;
    font-size: calc(10.5pt * var(--fit-font-scale, 1));
    line-height: calc(1.48 * var(--fit-line-scale, 1));
    color: #2c2c2c;
    padding: 48px 56px;
    width: 794px;
    margin: 0 auto;
    background: #ffffff;
  }
  .resume {
    width: 100%;
  }
  .resume-header {
    position: relative;
    min-height: 107px;
    margin-bottom: calc(12px * var(--fit-rhythm-scale, 1));
    padding: 2px 91.75px calc(8px * var(--fit-rhythm-scale, 1)) 0;
  }
  .resume-header-divider {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    width: 100%;
    height: 0;
    border-bottom: 2.5px solid #1a5276;
  }
  [data-section-type="name"] {
    font-size: 34pt;
    font-weight: 700;
    color: #1a5276;
    letter-spacing: 7px;
    margin-bottom: 6px;
  }
  [data-section-type="contact"] {
    max-width: 100%;
    margin-top: 11px;
    font-size: 9.5pt;
    color: #666;
    line-height: 1.5;
  }
  .photo-slot {
    position: absolute;
    top: 2px;
    right: 0;
    width: 75.75px;
    height: 101px;
    border: 1.4px solid #a9c6d6;
    border-radius: 4px;
    background:
      linear-gradient(135deg, rgba(26, 82, 118, 0.07) 25%, transparent 25%) 0 0 / 12px 12px,
      linear-gradient(315deg, rgba(26, 82, 118, 0.07) 25%, transparent 25%) 0 0 / 12px 12px,
      #f8fbfd;
    color: #7d96a5;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 9pt;
    font-weight: 500;
    letter-spacing: 1px;
    overflow: hidden;
  }
  .photo-slot p {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .photo-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .resume-section {
    margin-bottom: calc(13px * var(--fit-rhythm-scale, 1));
  }
  .resume-section-title {
    font-size: 14pt;
    font-weight: 600;
    color: #1a5276;
    border-bottom: 1.2px solid #b0cfe0;
    padding-bottom: 3px;
    margin-bottom: 8px;
  }
  .resume-section-content p { margin-bottom: calc(6px * var(--fit-rhythm-scale, 1)); }
  .resume-section-content > p,
  .resume-section-content > ul > li,
  .resume-section-content > ol > li {
    text-align: justify;
    text-justify: inter-ideograph;
  }
  .resume-section-content ul { padding-left: 18px; margin-bottom: calc(6px * var(--fit-rhythm-scale, 1)); }
  .resume-section-content li { margin-bottom: calc(2px * var(--fit-rhythm-scale, 1)); }
  .resume-section-content strong { color: #1a5276; }
  .resume-section-content h1 {
    font-size: 28pt;
    font-weight: 700;
    letter-spacing: 2px;
    margin: 8px 0 4px;
    color: #1a5276;
  }
  .resume-section-content h2 {
    font-size: 14pt;
    font-weight: 600;
    margin: 8px 0 4px;
    color: #333;
  }
  .resume-section-content h3 {
    font-size: 12.5pt;
    font-weight: 600;
    margin: 8px 0 4px;
    color: #333;
  }
  .resume-section-content h4 {
    font-size: 11.25pt;
    font-weight: 600;
    margin: 7px 0 3px;
    color: #333;
  }
  .resume-section-content h5 {
    font-size: 10.5pt;
    font-weight: 600;
    margin: 6px 0 2px;
    color: #333;
  }
  .resume-section-content h6 {
    font-size: 10pt;
    font-weight: 600;
    margin: 5px 0 2px;
    color: #444;
  }
  .inner-row {
    display: grid;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
  }
  .inner-col {
    min-width: 0;
    overflow-wrap: anywhere;
    box-sizing: border-box;
  }
  .inner-col--left { text-align: left; }
  .inner-col--center { text-align: center; }
  .inner-col--right { text-align: right; }
  .inner-col h1, .inner-col h2, .inner-col h3,
  .inner-col h4, .inner-col h5, .inner-col h6,
  .inner-col p { margin: 0; }
</style>
</head>
<body>
  <div class="resume">
    <div class="resume-header">
      <h1 data-section-type="name"></h1>
      <div class="contact" data-section-type="contact"></div>
      <div class="photo-slot" data-section-type="photo"></div>
      <div class="resume-header-divider" aria-hidden="true"></div>
    </div>

    <main data-sections-slot="main"></main>
  </div>
</body>
</html>
